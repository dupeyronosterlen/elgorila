name: Mantener servidor despierto

on:
  schedule:
    # Cada 10 minutos entre 8am y 11pm hora CDMX (UTC-6 = 14:00-05:00 UTC)
    - cron: '*/10 14-23 * * *'
    - cron: '*/10 0-5 * * *'
  workflow_dispatch: # Permite correrlo a mano desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping al servidor
        run: |
          echo "Despertando servidor en Render..."
          curl -s -o /dev/null -w "Status: %{http_code}" \
            https://elgorila-boletaje-api.onrender.com/api/availability
          echo " — OK"
